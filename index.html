<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hart Baits TD</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="game" width="1000" height="600"></canvas>

<div id="ui">

<h2>Status</h2>

Money: $<span id="money">300</span><br>
Health: <span id="health">100</span>

<button onclick="startWave()">Start Wave</button>
<button onclick="toggleSpeed()">2× Speed</button>

<h3>Towers</h3>

<div id="towerBar">

<div class="towerBtn" data-id="0"><img src="https://cdn-icons-png.flaticon.com/512/616/616494.png"></div>
<div class="towerBtn" data-id="1"><img src="https://cdn-icons-png.flaticon.com/512/3523/3523063.png"></div>
<div class="towerBtn" data-id="2"><img src="https://cdn-icons-png.flaticon.com/512/2917/2917990.png"></div>
<div class="towerBtn" data-id="3"><img src="https://cdn-icons-png.flaticon.com/512/149/149852.png"></div>

</div>

<div id="towerTooltip"></div>

</div>

<script src="game.js"></script>

</body>
</html>
