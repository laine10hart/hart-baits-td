<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hart Baits TD</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

<div id="leftPanel">

<h2>Upgrade</h2>

<div id="towerInfo">
Select a tower
</div>

<button id="upgradeBtn">Upgrade</button>
<button id="sellBtn">Sell</button>

</div>


<div id="gameArea">

<canvas id="game" width="900" height="500"></canvas>

</div>


<div id="rightPanel">

<h2>Status</h2>

Money: $<span id="money">300</span><br>
Health: <span id="health">20</span><br>
Wave: <span id="wave">1</span>

<button onclick="nextWave()">Start Wave</button>

<h3>Towers</h3>

<button onclick="selectTower('rod')">Rod Tower ($100)</button>
<button onclick="selectTower('rapid')">Rapid Tower ($150)</button>
<button onclick="selectTower('farm')">Money Farm ($200)</button>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
