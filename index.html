<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hart Baits Tower Defense</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Hart Baits Tower Defense</h1>

<div id="stats">
Money: $<span id="money">300</span>
Health: <span id="health">20</span>
Wave: <span id="wave">1</span>
</div>

<div id="shop">

<button onclick="selectTower('rod')">
Rod Turret ($100)
</button>

<button onclick="selectTower('rapid')">
Rapid Reel ($150)
</button>

<button onclick="selectTower('farm')">
Bait Farm ($200)
</button>

<button onclick="selectTower('support')">
Discount Tower ($180)
</button>

<button onclick="startNextWave()">
Next Wave
</button>

</div>

<canvas id="game" width="900" height="500"></canvas>

<div id="gameover" style="display:none;">
<h2>Game Over</h2>
<p>You reached wave <span id="finalWave"></span></p>
</div>

<script src="game.js"></script>

</body>
</html>
