<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hart Baits TD</title>

<style>

body{
margin:0;
font-family:Arial;
background:#2c4f4f;
color:white;
overflow:hidden;
}

#ui{
position:absolute;
right:0;
top:0;
width:220px;
height:100%;
background:#1e2e2e;
padding:10px;
}

button{
width:100%;
margin:4px 0;
padding:6px;
cursor:pointer;
}

canvas{
background:#4fa96c;
}

</style>
</head>

<body>

<canvas id="game" width="1000" height="600"></canvas>

<div id="ui">

<h3>Status</h3>

Money: $<span id="money">300</span><br>
Health: <span id="health">100</span>

<button onclick="startWave()">Start Wave</button>
<button onclick="toggleSpeed()">2x Speed</button>

<h3>Towers</h3>

<button onclick="selectTower(0)">Basic</button>
<button onclick="selectTower(1)">Rapid</button>
<button onclick="selectTower(2)">Sniper</button>
<button onclick="selectTower(3)">Freeze</button>
<button onclick="selectTower(4)">Cannon</button>
<button onclick="selectTower(5)">Splash</button>
<button onclick="selectTower(6)">Laser</button>
<button onclick="selectTower(7)">Poison</button>
<button onclick="selectTower(8)">Farm</button>
<button onclick="selectTower(9)">Support</button>

</div>

<script src="game.js"></script>

</body>
</html>
