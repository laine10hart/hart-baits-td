<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hart Baits Tower Defense</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startMenu">

<h1>Hart Baits Tower Defense</h1>

<label>Choose Map</label>

<select id="mapSelect">
<option value="river">River Bend</option>
<option value="swamp">Swamp Path</option>
<option value="harbor">Harbor Route</option>
</select>

<br><br>

<button onclick="startGame()">Start Game</button>

</div>


<div id="gameContainer">

<div id="leftPanel">

<h2>Upgrades</h2>

<div id="towerInfo">
Click a tower
</div>

<button id="upgradeBtn">Upgrade</button>
<button id="sellBtn">Sell</button>

</div>


<div id="gameArea">

<canvas id="game" width="900" height="500"></canvas>

</div>


<div id="rightPanel">

<h2>Stats</h2>

Money: $<span id="money">300</span><br>
Health: <span id="health">20</span><br>
Wave: <span id="wave">1</span><br>

<button onclick="nextWave()">Next Wave</button>

<h3>Towers</h3>

<div class="towerGrid">

<img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" onclick="selectTower('rod')">
<img src="https://cdn-icons-png.flaticon.com/512/3523/3523063.png" onclick="selectTower('rapid')">
<img src="https://cdn-icons-png.flaticon.com/512/2917/2917990.png" onclick="selectTower('farm')">
<img src="https://cdn-icons-png.flaticon.com/512/149/149852.png" onclick="selectTower('support')">

</div>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
