<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hart Baits Tower Defense</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

<div id="leftPanel">

<h2>Tower Upgrades</h2>

<div id="towerInfo">
Click a tower
</div>

<button id="upgradeBtn">Upgrade</button>
<button id="sellBtn">Sell</button>

</div>


<div id="gameArea">

<canvas id="game" width="900" height="500"></canvas>

</div>


<div id="rightPanel">

<h2>Game Stats</h2>

<p>Money: $<span id="money">300</span></p>
<p>Health: <span id="health">20</span></p>
<p>Wave: <span id="wave">1</span></p>

<button onclick="nextWave()">Next Wave</button>

<h3>Towers</h3>

<button onclick="selectTower('rod')">
Rod Turret ($100)
</button>

<button onclick="selectTower('rapid')">
Rapid Reel ($150)
</button>

<button onclick="selectTower('farm')">
Bait Farm ($200)
</button>

<button onclick="selectTower('support')">
Discount Tower ($180)
</button>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
